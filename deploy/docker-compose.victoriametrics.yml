services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=3y"  # Match NFSEN_IMPORT_YEARS
      - "--search.maxQueryDuration=60s"
      - "--search.latencyOffset=30s"
    restart: unless-stopped
    networks:
      - nfsen-ng

  nfsen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    container_name: nfsen-ng
    expose:
      - "9000"
    volumes:
      - /var/nfdump/profiles-data:/data/nfsen-ng
      - ..:/var/www/html/nfsen-ng
    environment:
      - TZ=UTC
      - NFSEN_NFDUMP_PROFILES=/data/nfsen-ng
      - NFSEN_IMPORT_YEARS=3
      # VictoriaMetrics configuration
      - NFSEN_DATASOURCE=VictoriaMetrics
      - VM_HOST=victoriametrics
      - VM_PORT=8428
    entrypoint: ["/bin/bash", "/var/www/html/nfsen-ng/deploy/docker-entrypoint-dev.sh"]
    depends_on:
      - victoriametrics
    restart: unless-stopped
    networks:
      - nfsen-ng

  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    container_name: nfsen-caddy
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend:/var/www/html/nfsen-ng/frontend:ro
    depends_on:
      - nfsen
    restart: unless-stopped
    networks:
      - nfsen-ng

volumes:
  vm-data:
    driver: local

networks:
  nfsen-ng:
    driver: bridge
