# Production Docker Compose configuration
# Uses production Dockerfile (clones from git, no dev dependencies)
#
# Two deployment modes:
#
#   1. With bundled Caddy (TLS, Brotli/zstd, static files):
#        docker compose --profile proxy up -d
#      Access at https://<your-domain>  (port 80/443)
#
#   2. Behind your own reverse proxy (Traefik, nginx, Caddy, …):
#        docker compose up -d
#      Proxy requests to http://nfsen:9000  (internal Docker hostname)
#      Or uncomment the `ports` entry on the nfsen service to expose 9000 directly.

services:
  nfsen:
    build:
      context: ..
      dockerfile: deploy/Dockerfile  # Use production Dockerfile
    container_name: nfsen-ng
    expose:
      - "9000"  # Swoole HTTP server (internal only, reachable as nfsen:9000 inside Docker)
    # Uncomment to expose port 9000 directly to the host (useful when using your own reverse proxy):
    # ports:
    #   - "9000:9000"
    volumes:
      - /var/nfdump/profiles-data:/data/nfsen-ng
    environment:
      - TZ=UTC
      
      # Import configuration (see ENVIRONMENT_VARIABLES.md for details)
      # - NFSEN_FORCE_IMPORT=true         # Reset database and import from scratch
      # - NFSEN_IMPORT_VERBOSE=true       # Show verbose import output
      # - NFSEN_SKIP_INITIAL_IMPORT=true  # Skip initial import on startup
      # - NFSEN_IMPORT_YEARS=5            # Import last N years (default: 3)
      
      # Logging (controls both application and Swoole)
      # - NFSEN_LOG_LEVEL=INFO            # DEBUG, INFO, NOTICE, WARNING, ERR, CRIT, ALERT, EMERG
      
      # Swoole HTTP server performance tuning
      # - SWOOLE_WORKER_NUM=8             # Number of worker processes (default: 4, set to CPU cores)
      # - SWOOLE_MAX_REQUEST=50000        # Max requests per worker before restart (default: 10000)
      # - SWOOLE_MAX_COROUTINE=20000      # Max concurrent SSE connections (default: 10000)
    entrypoint: ["/bin/bash", "/var/www/html/nfsen-ng/deploy/docker-entrypoint.sh"]
    restart: unless-stopped
  
  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    container_name: nfsen-caddy
    ports:
      - "80:80"  # External HTTP port
      - "443:443"  # HTTPS
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ../frontend:/var/www/html/nfsen-ng/frontend:ro  # Static files
      - caddy_data:/data  # Certificate storage
      - caddy_config:/config  # Caddy config storage
    depends_on:
      - nfsen
    profiles:
      - proxy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
