services:
  nfsen:
    build:
      context: .
      dockerfile: Dockerfile.dev  # Use development Dockerfile
    container_name: nfsen-ng
    expose:
      - "9000"  # OpenSwoole HTTP server (internal only)
    volumes:
      - /var/nfdump/profiles-data:/data/nfsen-ng
      - .:/var/www/html/nfsen-ng  # Mount source for development
      # Uncomment to use separate RRD volume (otherwise uses backend/datasources/data in mounted source)
      # - rrd-data:/var/nfsen-ng/rrd
    environment:
      - TZ=UTC
      - NFSEN_NFDUMP_PROFILES=/data/nfsen-ng  # Must match the container-side volume mount path
      # Uncomment to use separate RRD data path
      # - NFSEN_RRD_PATH=/var/nfsen-ng/rrd

      # Import configuration (see ENVIRONMENT_VARIABLES.md for details)
      # - NFSEN_FORCE_IMPORT=true         # Reset database and import from scratch (use manually when needed)
      # - NFSEN_IMPORT_VERBOSE=true       # Show verbose import output
      # - NFSEN_SKIP_INITIAL_IMPORT=true  # Skip initial import on startup
      - NFSEN_IMPORT_YEARS=1            # Import last N years (default: 3)

      # Logging
      # - NFSEN_LOG_LEVEL=DEBUG           # DEBUG, INFO, NOTICE, WARNING, ERR, CRIT, ALERT, EMERG

      # OpenSwoole HTTP server performance tuning
      # - SWOOLE_WORKER_NUM=8             # Number of worker processes (default: 1)
      # - SWOOLE_MAX_COROUTINE=20000      # Max concurrent SSE connections (default: 10000)
    entrypoint: ["/bin/bash", "/var/www/html/nfsen-ng/docker-entrypoint-dev.sh"]
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: nfsen-caddy
    ports:
      - "8080:80"  # External HTTP port
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/var/www/html/nfsen-ng/frontend:ro  # Static files
    depends_on:
      - nfsen
    restart: unless-stopped

  # nfcapd — NetFlow collector for local development with softflowd.
  #
  # Usage:
  #   1. Uncomment this service.
  #   2. Add "all" to your backend/settings/settings.php sources list.
  #   3. Start the stack: docker-compose -f docker-compose.dev.yml up -d
  #   4. Install softflowd on the host and point it at port 9995:
  #        sudo softflowd -i <interface> -n 127.0.0.1:9995 -v 9
  #      or run it permanently via the bundled systemd unit:
  #        sudo cp systemd/softflowd.service /etc/systemd/system/
  #        sudo systemctl enable --now softflowd
  #
  # Note: network_mode: host is required because Docker's port-mapping NAT does
  # not intercept loopback (127.0.0.1) traffic on Linux. Without it nfcapd
  # receives 0 packets even though the port appears bound.
  # nfcapd writes nfcapd files to /var/nfdump/profiles-data/live/all/ on the
  # host (same directory the nfsen container reads via the shared volume).
  #
  nfcapd:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nfsen-nfcapd
    network_mode: host  # Must use host networking so softflowd's loopback UDP reaches the container
    volumes:
      - /var/nfdump/profiles-data:/data/nfsen-ng
    entrypoint: ["/usr/local/nfdump/bin/nfcapd"]
    command: ["-w", "/data/nfsen-ng/live/all", "-z", "-S", "1", "-T", "all", "-p", "9995"]
    restart: unless-stopped

# volumes:
#   rrd-data:  # Uncomment if using separate RRD volume
